<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

</head>
<body>
    <div class="container-fluid d-flex flex-column min-vh-100">
        <header class="row justify-content-center border-0 border-bottom border-2 border-dark">
            <h3 class="col-auto">Your Order Food List</h3>
        </header>
        <div class="row justify-content-center border-0 border-bottom border-2 border-dark">
            <div class="col text-center">
                Food
            </div>
            <div class="col text-center">
                Quantity
            </div>
            <div class="col text-center">
                Price Per Item
            </div>
            <div class="col text-center">
                Total Price
            </div>
            <div class="col text-center">
            
            </div>
        </div>
         {%for item in cart_items %}
        <div class="row justify-content-center">
           
                <div class="col text-center">
                    {{item.name}}
                </div>
                <div class="col text-center">
                    {{item.quantity}}
                </div>
                <div class="col text-center">
                    $ {{item.price}}
                </div>
                <div class="col text-center">
                    $ {{item.total}}
                    
                </div>

                <div class="col text-center">
                    <form action="{% url 'foodOrder:removeQuantity' item.id %}" method="post">
                        {% csrf_token %}
                        <button type="submit" class="btn btn-danger" name="action" value="remove">Remove</button>
                    </form>
                </div>
            
        </div>
        {%empty%}
        <div class="row justify-content-center">
            You haven't added to your cart yet.
        </div>
        {%endfor%}
        <!-- Footer -->
        <footer class="row justify-content-center border-0 border-top border-2 border-dark py-3 mt-auto">
            <div class="col-auto">
                <a href="{%url  'foodOrder:index' %}">Back to Food List</a>
            </div>
        </footer>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
